<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <!-- Immediate redirect -->
    <meta http-equiv="refresh" content="0; url=https://lipella.com/">

    <!-- Preferred URL for search engines -->
    <link rel="canonical" href="https://lipella.com/">

    <!-- Prevent this redirect page from being indexed -->
    <meta name="robots" content="noindex,follow">

    <script>
        window.location.replace("https://lipella.com/");
    </script>
</head>
<body>
    <p>If you are not redirected automatically,
        <a href="https://lipella.com/">click here</a>.
    </p>
</body>
</html>
